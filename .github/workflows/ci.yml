name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------
  # Job 1: Code quality (fmt + clippy)
  # -----------------------------------------------
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # -----------------------------------------------
  # Job 2: Tests
  # -----------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Run tests
        run: cargo test --workspace

  # -----------------------------------------------
  # Job 3a: Build musl release binary (servers, no desktop control)
  # -----------------------------------------------
  build-musl:
    name: Build (musl — server)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary (no desktop-control — musl can't link wayland/xcb)
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --bin temm1e \
            --no-default-features \
            --features telegram,discord,browser,mcp,codex-oauth,openssl-vendored

      - name: Check binary size (<30 MB)
        run: |
          BINARY="target/x86_64-unknown-linux-musl/release/temm1e"
          SIZE=$(stat -c%s "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB} MB ($SIZE bytes)"
          if [ "$SIZE" -gt 31457280 ]; then
            echo "::error::Binary size ${SIZE_MB} MB exceeds 30 MB limit"
            exit 1
          fi
          echo "Binary size OK: ${SIZE_MB} MB"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: temm1e-x86_64-linux
          path: target/x86_64-unknown-linux-musl/release/temm1e
          retention-days: 7

  # -----------------------------------------------
  # Job 3b: Build glibc release binary (desktops, WITH desktop control)
  # -----------------------------------------------
  build-glibc:
    name: Build (glibc — desktop)
    runs-on: ubuntu-22.04    # glibc 2.35 — runs on Ubuntu 22.04+
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Install desktop-control system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libclang-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxkbcommon-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libdrm-dev \
            libxdo-dev \
            libdbus-1-dev \
            libxrandr-dev

      - name: Build release binary (all default features including desktop-control)
        run: cargo build --release --bin temm1e

      - name: Check binary size (<30 MB)
        run: |
          BINARY="target/release/temm1e"
          SIZE=$(stat -c%s "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB} MB ($SIZE bytes)"
          echo "Binary size: ${SIZE_MB} MB"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: temm1e-x86_64-linux-desktop
          path: target/release/temm1e
          retention-days: 7

  # -----------------------------------------------
  # Job 4: Docker image build
  # -----------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: temm1e:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size (<50 MB)
        run: |
          docker buildx build --load -t temm1e:size-check .
          SIZE=$(docker image inspect temm1e:size-check --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE" -gt 52428800 ]; then
            echo "::warning::Docker image size ${SIZE_MB} MB exceeds 50 MB target"
          fi

  # -----------------------------------------------
  # Job 5: Security audit
  # -----------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo audit (advisory, non-blocking)
        run: cargo audit || echo "::warning::cargo audit found advisories (see above). These are in upstream transitive dependencies — review and update when patches are available."
