name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo fmt check
        run: cargo fmt --check

  release:
    name: Release — ${{ matrix.target }}
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux server binary (musl, static, no desktop-control)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: temm1e-x86_64-linux
            desktop: false
          # Linux desktop binary (glibc, WITH desktop-control)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04      # glibc 2.35 — runs on Ubuntu 22.04+
            artifact: temm1e-x86_64-linux-desktop
            desktop: true
          # macOS (both include desktop-control via defaults)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: temm1e-x86_64-macos
            desktop: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: temm1e-aarch64-macos
            desktop: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools perl make
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Install desktop-control system deps (Linux glibc)
        if: matrix.desktop
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libclang-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxkbcommon-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libdrm-dev \
            libxdo-dev \
            libdbus-1-dev \
            libxrandr-dev

      - name: Build release binary
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            # Musl: no desktop-control (system libs can't static-link)
            cargo build --release --target ${{ matrix.target }} --bin temm1e \
              --no-default-features \
              --features telegram,discord,browser,mcp,codex-oauth,openssl-vendored
          else
            # macOS + Linux glibc: default features (includes desktop-control)
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/temm1e dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum temm1e-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/temm1e-*
            dist/checksums-sha256.txt
          generate_release_notes: true
